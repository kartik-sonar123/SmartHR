<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>employee Info</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="/css/bg.css">
<style>
li a {
	text-transform: uppercase;
}

a {
	text-decoration: none;
}

/* Scrollable table container */
.table-container {
	overflow-x: auto;
}

/* Sticky header */
table thead th {
	position: sticky;
	top: 0;
	background-color: #dee2e6;
	z-index: 2;
}

table {
	min-width: 1200px;
}

td, th {
	white-space: nowrap;
	vertical-align: middle;
}

.truncate {
	max-width: 150px;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
}
</style>
</head>
<body>
	<nav class="navbar navbar-expand-lg bg-body-tertiary">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Dashboard</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item"><a class="nav-link active"
						aria-current="page" href="adminDashboard">Dashboard</a></li>
					<li class="nav-item"><a class="nav-link active"
						href="employees">Employees</a></li>
					<li class="nav-item"><a class="nav-link active"
						th:href="@{logout}">Logout</a></li>
				</ul>
				<form class="d-flex" role="search">
					<input class="form-control me-2" type="search"
						placeholder="Search employee" aria-label="Search">
					<button class="btn btn-outline-success" type="submit">Search</button>
				</form>
			</div>
		</div>
	</nav>

	<main>
		<div class="container mt-3">
			<div class="text-center">
				<a th:href="@{/addEmp}" class="btn btn-success fw-medium"
					role="button">Add new Employee</a>
			</div>

			<div class="table-container mt-4">
				<table
					class="table table-bordered table-hover table-striped align-middle text-center table-secondary">
					<thead>
						<tr>
							<th>Id</th>
							<th>Name</th>
							<th>Email</th>
							<th>Phone</th>
							<th>Role</th>
							<th>Salary</th>
							<th>Department</th>
							<th>Joining Date</th>
							<th>Address</th>
							<th>Edit</th>
							<th>Delete</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="emp : ${employees}">
							<td th:text="${emp.id}"></td>
							<td th:text="${emp.name}"></td>
							<td><span class="truncate" th:title="${emp.email}"
								th:text="${emp.email}"></span></td>
							<td th:text="${emp.phoneNo}"></td>
							<td th:text="${emp.jobRole}"></td>
							<td th:text="${emp.salary}"></td>
							<td th:text="${emp.department}"></td>
							<td th:text="${emp.joiningDate}"></td>
							<td><span class="truncate" th:title="${emp.address}"
								th:text="${emp.address}"></span></td>
							<td><a class="btn btn-warning pe-3 ps-3 fw-medium"
								th:href="@{/edit/{id}(id=${emp.id})}">Edit</a></td>
							<td><a class="btn btn-danger fw-medium"
								th:href="@{/delete/{id}(id=${emp.id})}">Delete</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</main>
</body>
</html>

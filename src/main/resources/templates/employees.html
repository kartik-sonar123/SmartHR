<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">
<style>
li a {
	text-transform: uppercase;
}
</style>
</head>
<body>
	<nav class="navbar navbar-expand-lg bg-body-tertiary">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Dashboard</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item"><a class="nav-link active"
						aria-current="page" href="dashboard">Dashboard</a></li>
					<li class="nav-item"><a class="nav-link  active" href="employees">
							Employees</a></li>
					<li class="nav-item"><a class="nav-link  active"
						th:href="@{logout}">Logout</a></li>
				</ul>
				<form class="d-flex" role="search">
					<input class="form-control me-2" type="search"
						placeholder="Search employee" aria-label="Search">
					<button class="btn btn-outline-success" type="submit">Search</button>
				</form>
			</div>
		</div>
	</nav>

	<main>

		<div class="container">
			<div class="text-center mt-3 ">
				<a th:href="@{/addEmp}" class="btn btn-success" role="button">Add
					new Employee</a>
			</div>
			<div class="mt-4">
				<table class="table  table-hover table-responsive table-secondary">
					<tr>
						<th>Id</th>
						<th>Name</th>
						<th>Email</th>
						<th>Phone</th>
						<th>Role</th>
						<th>Salary</th>
						<th>Address</th>
						<th>Edit</th>
						<th>Delete</th>
					</tr>
					<tr th:each="emp : ${employees}">
						<td th:text="${emp.id}"></td>
						<td th:text="${emp.name}"></td>
						<td th:text="${emp.email}"></td>
						<td th:text="${emp.phoneNo}"></td>
						<td th:text="${emp.jobRole}"></td>
						<td th:text="${emp.salary}"></td>
						<td th:text="${emp.address}"></td>
						<td><a th:href="@{/edit/{id}(id=${emp.id})}">Edit</a></td>
						<td><a th:href="@{/delete/{id}(id=${emp.id})}">Delete</a></td>
					</tr>
				</table>
			</div>
		</div>
	</main>
</body>
</html>

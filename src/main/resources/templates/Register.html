<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registration</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">
</head>
<body>
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-lg p-4">
					<h2 class="text-center">Registration Form</h2>
					<form th:action="@{/saveUser}" th:object="${user}" method="post"> 
						<div class="mb-1 mt-1">
							<label class="form-label">UserName:</label> <input type="text"
								class="form-control"  th:field="*{name}" placeholder="Enter your name:" required>
							
						</div>
						<div class="mb-1 mt-3">
							<label class="form-label">Email:</label> <input type="email"
								class="form-control" th:field="*{email}" placeholder="Enter you Email" required>
						</div>
						<div class="mb-1 mt-3 ">
							<label class="form-label">Password:</label> <input
								type="password" class="form-control" th:field="*{password}"
								placeholder="Enter password" required>
						</div>
						<div class="mb-1 mt-3">
							<label class="form-label">PhoneNo:</label> <input type="text"
								class="form-control" th:field="*{phone}" placeholder="Enter you phone No" required>
						</div>
						<div class="mb-1 mt-3 ">
							   <label for="role">Select
								Role:</label> <select id="role" class="form-select shadow" name="role" th:field="*{role}" required>
								<option value="EMPLOYEE" selected>Employee</option>
							</select>
						</div>
						<div class="mt-3">
							<button class="btn btn-success form-control" type="submit">Register</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>

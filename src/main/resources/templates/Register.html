<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registration</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet" href="/css/bg.css">
</head>
<body>
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-lg shadow pe-4 ps-4 py-3 mt-2">
					<h3 class="text-center">Registration Form</h3>
					<form th:action="@{/saveUser}" th:object="${user}" method="post">
						<div class="mt-2">
							<label class="form-label">UserName:</label> <input type="text"
								class="form-control" th:field="*{name}"
								placeholder="Enter your name:" required>

						</div>
						<div class="mt-2">
							<label class="form-label">Email:</label> <input type="email"
								class="form-control" th:field="*{email}"
								placeholder="Enter you Email" required>
						</div>
						<div class="mt-2">
							<label class="form-label">Password:</label> <input
								type="password" class="form-control" th:field="*{password}"
								placeholder="Enter password" required>
						</div>
						<div class="mt-2">
							<label class="form-label">PhoneNo:</label> <input type="text"
								class="form-control" th:field="*{phone}"
								placeholder="Enter you phone No" required>
						</div>
						<div class="mt-2 ">
							<label for="role">Select Role:</label> <select id="role"
								class="form-select shadow" name="role" th:field="*{role}"
								required>
								<option value="EMPLOYEE" selected>Employee</option>
							</select>
						</div>
						<div class="mt-3">
							<button class="btn btn-primary form-control" type="submit">Register</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>

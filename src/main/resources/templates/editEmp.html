<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Employee</title>
<!-- Bootstrap CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: url('/images/form-bg.jpg') no-repeat center center fixed;
	background-size: cover;
	height: 100vh;
	margin: 0;
}

.form-card {
	background-color: rgba(0, 0, 0, 0.75);
	color: white;
	padding: 30px;
	border-radius: 12px;
	box-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
	max-height: 90vh;
	overflow-y: auto;
}

label {
	font-weight: 500;
}

.btn-success {
	font-weight: 600;
	font-size: 18px;
}
</style>
</head>
<body>
	<div
		class="container d-flex justify-content-center align-items-center vh-100">
		<div class="col-lg-6 col-md-8 form-card">
			<h2 class="text-center mb-4">Edit Employee Information</h2>
			<form th:action="@{/saveEdit/{id}(id=${employee.id})}"
				th:object="${employee}" method="post">
				<div class="mb-3">
					<label class="form-label">Name</label> <input type="text"
						class="form-control" placeholder="Enter employee name"
						th:field="*{name}" required>
				</div>
				<div class="mb-3">
					<label class="form-label">Email</label> <input type="email"
						class="form-control" placeholder="Enter employee email"
						th:field="*{email}" required>
				</div>
				<div class="mb-3">
					<label class="form-label">Phone</label> <input type="text"
						class="form-control" placeholder="Enter employee mobile number"
						th:field="*{phoneNo}" required>
				</div>
				<div class="mb-3">
					<label class="form-label">Job Title</label> <input type="text"
						class="form-control" placeholder="Enter employee job role"
						th:field="*{jobRole}" required>
				</div>
				<div class="mb-3">
					<label class="form-label">Department</label> <input type="text"
						class="form-control" placeholder="Enter employee department"
						th:field="*{department}" required>
				</div>
				<div class="mb-3">
					<label class="form-label">Salary</label> <input type="text"
						class="form-control" placeholder="Enter employee salary"
						th:field="*{salary}" required>
				</div>
				<div class="mb-3">
					<label class="form-label">Address</label> <input type="text"
						class="form-control" placeholder="Enter employee address"
						th:field="*{address}" required>
				</div>

				<!-- Joining date is not editable -->

				<div class="d-grid mt-4">
					<button type="submit" class="btn btn-success">Update</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Bootstrap JS -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Profile</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<style>
		li a
		{
			text-transform:uppercase;
		}
	</style>
</head>
<body>
	<nav class="navbar navbar-expand-lg bg-body-tertiary">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Employee Profile</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item"><a class="nav-link active"
						aria-current="page" href="#">Dashboard</a></li>
					<li class="nav-item"><a class="nav-link  active" href="#">Attendance</a></li>

					<li class="nav-item"><a class="nav-link  active" href="#">Leave</a></li>
					<li class="nav-item"><a class="nav-link  active"
						href="contact">Salary</a></li>
					<li class="nav-item"><a class="nav-link  active"
						th:href="@{logout}">Logout</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="container mt-5">
		<div class="card shadow-lg p-4">
			<div class="text-center mb-4">
				<img src="profile-placeholder.png" alt="Profile Image"
					class="rounded-circle" width="150">
				<h2 class="mt-3">
					<span th:text="${employee.name}"></span>
				</h2>
				<p class="text-muted">
					<span th:text="${employee.jobRole}"></span>
				</p>
			</div>
			<div class="row">
				<div class="col-md-6">
					<h5>Personal Details</h5>
					<ul class="list-group">
						<li class="list-group-item"><strong>Email:</strong> <span
							th:text="${employee.email}"></span></li>
						<li class="list-group-item"><strong>Phone:</strong> <span
							th:text="${employee.phoneNo}"></span></li>

						<li class="list-group-item"><strong>Address:</strong> <span
							th:text="${employee.address}"></span></li>
					</ul>
				</div>
				<div class="col-md-6">
					<h5>Employment Details</h5>
					<ul class="list-group">
						<li class="list-group-item"><strong>Department:</strong> IT</li>
						<li class="list-group-item"><strong>Joining Date:</strong> 01
							April 2025</li>
						<li class="list-group-item"><strong>Salary:</strong> <span
							th:text="${employee.salary}"></span></li>
					</ul>
				</div>
			</div>
			<div class="text-center mt-4">
				<button class="btn btn-primary">Edit Profile</button>
			</div>

		</div>
	</div>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Employee</title>
<style>
*{
	margin:0;
	padding:0;
	overflow-y:hidden;
}	
h2
{
	text-align: center;
	margin-bottom:2vh;
	margin-top:2vh;
	color:grey;
	
}
.forminputs 
{
	height:100vh;
	background-color:#dadada;
	text-align: center;
	border: 1px solid black;
	border-radius: 8px;
}

input
 {
	width: 50%;
	padding: 15px;
	margin: 8px;
	font-size: 18px;
	border-radius: 7px;
	padding: 15px;
	border:none;
}
button 
{
	background-color:green;
	color:white;
	border-radius: 5px;
	width:20%;
	padding: 13px;
	font-size: 20px;
	font-weight: 600;
}
</style>
</head>
<body>
	<div class="container">
		<form class="forminputs" th:action="@{/save}" th:object="${employees}" method="post">
			<h2>add new employee</h2>
			<div>
				<label>Name:<input type="text"
					placeholder="Enter employee name" th:field="*{name}" required></label><br> <br>
				<label>Email:<input type="email"
					placeholder="Enter employee email" th:field="*{email}" required></label><br> <br>
				<label>Phone:<input type="text"
					placeholder="Enter employee mobile number" th:field="*{phoneNo}" required></label><br> <br>
				<label>JobTitle:<input type="text"
					placeholder="Enter employee job role" th:field="*{jobRole}" required></label><br> <br>
				<label>Salary:<input type="text"
					placeholder="Enter employee salary" th:field="*{salary}" required></label><br> <br>
				<label>Address:<input type="text"
					placeholder="Enter employee address" th:field="*{address}" required></label><br> <br>
				<button type="submit">Submit</button>
			</div>
		</form>
	</div>
</body>
</html>
